<div class="container">
    {{tagChips}}
    {{filterBanner}}
    {{#hasItems}}
    <div class="blog-toolbar mt-2 mb-2">
        <div class="input-group hide-if-user-has-no-javascript">
            <input type="search" id="highlight-search" class="form-input" placeholder="Search highlights..." />
            <button type="button" class="btn btn-glossy" onclick="document.getElementById('highlight-search').value='';document.getElementById('highlight-search').dispatchEvent(new Event('input'))"><i class="bi bi-x-lg"></i></button>
        </div>
    </div>

    <form method="POST" action="/highlights/post" id="highlights-form">
        <div class="highlights-toolbar mb-2">
            <label class="highlight-select-all hide-if-user-has-no-javascript">
                <input type="checkbox" id="highlight-select-all-cb" /> <small>Select all</small>
            </label>
            <span class="blog-toolbar-spacer"></span>
            <small class="highlight-count hide-if-user-has-no-javascript">{{count}} highlight{{countPlural}}</small>
            <button type="button" class="btn btn-glossy btn-sm hide-if-user-has-no-javascript" id="delete-selected-highlights"><i class="bi bi-trash"></i> Delete</button>
            <button type="submit" class="btn btn-glossy btn-sm"><i class="bi bi-pencil-square"></i> Post selected</button>
        </div>

        {{feed}}
    </form>
    {{/hasItems}}

    {{#empty}}
    {{emptyMessage}}
    {{/empty}}
</div>

<script>
(function() {
    const btn = document.getElementById('delete-selected-highlights');
    if (!btn) return;

    // --- Hide action buttons until something is selected ---
    // Mirrors the notes/bookmarks select-toolbar pattern. The Post-selected
    // submit button has no `hide-if-user-has-no-javascript` class so the
    // noscript path still shows it; we only toggle here from JS.
    const postBtn = document.querySelector('#highlights-form button[type="submit"]');
    function updateActionsVisibility() {
        const any = !!document.querySelector('.highlight-card:not([style*="display: none"]) .highlight-checkbox:checked');
        const d = any ? '' : 'none';
        btn.style.display = d;
        if (postBtn) postBtn.style.display = d;
    }
    updateActionsVisibility();
    document.addEventListener('change', (e) => {
        const t = e.target;
        if (!t) return;
        if ((t.classList && t.classList.contains('highlight-checkbox')) || t.id === 'highlight-select-all-cb') {
            updateActionsVisibility();
        }
    });
    btn.addEventListener('click', async () => {
        const checked = document.querySelectorAll('.highlight-checkbox:checked');
        if (!checked.length) return;
        if (!confirm(`Delete ${checked.length} highlight${checked.length > 1 ? 's' : ''}?`)) return;
        btn.disabled = true;
        try {
            const results = await Promise.all([...checked].map(async (cb) => {
                const id = cb.dataset.highlightId;
                if (!id) return { ok: false, cb };
                const form = new URLSearchParams();
                form.append('id', id);
                try {
                    const res = await fetch('/highlights/delete?json=1', {
                        method: 'POST',
                        body: form.toString(),
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded; charset=utf-8', 'Accept': 'application/json' }
                    });
                    const j = await res.json().catch(() => ({}));
                    return { ok: !!j.ok, cb };
                } catch {
                    return { ok: false, cb };
                }
            }));
            let failed = 0;
            const failedCards = [];
            for (const r of results) {
                if (r.ok) { r.cb.closest('.highlight-card')?.remove(); }
                else {
                    failed++;
                    const card = r.cb.closest('.highlight-card');
                    if (card) { card.classList.add('op-failed'); failedCards.push(card); }
                }
            }
            const selectAll = document.getElementById('highlight-select-all-cb');
            if (selectAll) selectAll.checked = false;
            const remaining = document.querySelectorAll('.highlight-card').length;
            const countEl = document.querySelector('.highlight-count');
            if (countEl) countEl.textContent = `${remaining} highlight${remaining !== 1 ? 's' : ''}`;
            if (failedCards.length) {
                setTimeout(() => failedCards.forEach(c => c.classList.remove('op-failed')), 6000);
            }
            if (failed) alert(`${failed} highlight${failed > 1 ? 's' : ''} could not be deleted. The failed item${failed > 1 ? 's are' : ' is'} highlighted.`);
        } finally {
            btn.disabled = false;
        }
    });
})();
</script>
