<div class="container">
    {{#hasItems}}
    <div class="blog-toolbar mt-2 mb-2">
        <div class="input-group hide-if-user-has-no-javascript">
            <input type="search" id="highlight-search" class="form-input" placeholder="Search highlights..." />
            <button type="button" class="btn btn-glossy" onclick="document.getElementById('highlight-search').value='';document.getElementById('highlight-search').dispatchEvent(new Event('input'))"><i class="bi bi-x-lg"></i></button>
        </div>
    </div>

    <form method="POST" action="/highlights/post" id="highlights-form">
        <div class="highlights-toolbar mb-2">
            <label class="highlight-select-all hide-if-user-has-no-javascript">
                <input type="checkbox" id="highlight-select-all-cb" /> <small>Select all</small>
            </label>
            <span class="blog-toolbar-spacer"></span>
            <small class="highlight-count hide-if-user-has-no-javascript">{{count}} highlight{{countPlural}}</small>
            <button type="submit" class="btn btn-glossy btn-sm"><i class="bi bi-pencil-square"></i> Post selected</button>
        </div>

        {{feed}}
    </form>
    {{/hasItems}}

    {{#empty}}
    <p class="mt-2" style="color:var(--overlay-1)">No highlights yet. Highlights are created in Micro.blog's Reader.</p>
    {{/empty}}
</div>
