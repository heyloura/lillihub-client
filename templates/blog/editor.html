<div class="container editor-page">
    <form class="editor-form" action="/post/{{editOrAdd}}" method="POST" enctype="multipart/form-data">
        <input name="destination" type="hidden" value="{{mpDestination}}">
        {{editInput}}

        <div class="editor-toolbar">
            <div class="editor-toolbar-left">
                {{destinationDropdown}}
            </div>
            <div class="editor-toolbar-right">
                {{collectionsDropdown}}
                {{categoriesDropdown}}
                {{syndicatesDropdown}}
            </div>
        </div>

        <input class="form-input editor-title" name="name" type="text" placeholder="Title (optional)" value="{{title}}">

        <label class="editor-upload-label btn-glossy" hidden>
            <i class="bi bi-paperclip"></i> Attach media
            <input type="file" accept="image/*,video/*,audio/*,.pdf,.zip" multiple class="editor-file-input">
        </label>

        <textarea id="editor-content" class="form-input editor-textarea" name="content" placeholder="Write here...">{{image}}{{quoteback}}{{content}}{{bookPost}}</textarea>
        <div id="char-count" class="editor-char-count hide-if-user-has-no-javascript"></div>

        <details class="editor-summary-toggle" {{summaryOpen}}>
            <summary>Summary</summary>
            <textarea class="form-input editor-summary" name="summary" placeholder="A short summary for your post (optional)" rows="2">{{summary}}</textarea>
        </details>

        <div id="editor-previews" class="editor-previews hide-if-user-has-no-javascript" data-collections='{{collectionsJSON}}'></div>

        <div class="editor-footer">
            {{deleteButton}}
            <span id="autosave-status" class="editor-autosave-status hide-if-user-has-no-javascript"></span>
            <span class="editor-footer-spacer"></span>
            <button type="submit" formaction="/post/preview" class="btn">Preview</button>
            <button type="submit" name="status" value="draft" class="btn">Save Draft</button>
            <button type="submit" name="status" value="publish" class="btn btn-glossy">Publish</button>
        </div>
    </form>
</div>
<script>
(function() {
    var ta = document.getElementById('editor-content');
    if (!ta) return;

    // Show upload button (hidden without JS)
    var uploadLabel = document.querySelector('.editor-upload-label');
    if (uploadLabel) {
        uploadLabel.removeAttribute('hidden');
        var fileInput = uploadLabel.querySelector('.editor-file-input');
        if (fileInput) {
            fileInput.addEventListener('change', function() {
                for (var i = 0; i < fileInput.files.length; i++) uploadFile(fileInput.files[i]);
                fileInput.value = '';
            });
        }
    }

    // Auto-grow textarea (growTextArea is defined in common.js)
    ta.addEventListener('input', function() { growTextArea(ta); updateCharCount(); });
    growTextArea(ta);

    // Smart character count — strips markdown to approximate displayed text length.
    var charCountEl = document.getElementById('char-count');
    function stripMarkdown(s) {
        return s
            .replace(/!\[[^\]]*\]\([^)]*\)/g, '')       // images (remove entirely)
            .replace(/\[([^\]]*)\]\([^)]*\)/g, '$1')    // links → keep text
            .replace(/[*_~`]{1,3}([^*_~`]+)[*_~`]{1,3}/g, '$1') // bold/italic/strike/code
            .replace(/^#{1,6}\s+/gm, '')                 // headings
            .replace(/^>\s?/gm, '')                      // blockquotes
            .replace(/^[-*+]\s+/gm, '')                  // list markers
            .replace(/^\d+\.\s+/gm, '');                 // ordered list markers
    }
    function updateCharCount() {
        var text = stripMarkdown(ta.value).trim();
        var len = text.length;
        charCountEl.textContent = len + ' character' + (len !== 1 ? 's' : '');
        charCountEl.classList.toggle('over-limit', len > 300);
    }
    updateCharCount();

    // Wrap selection with markdown syntax
    function wrapSelection(before, after) {
        var start = ta.selectionStart, end = ta.selectionEnd;
        var text = ta.value;
        ta.value = text.slice(0, start) + before + text.slice(start, end) + after + text.slice(end);
        ta.selectionStart = start + before.length;
        ta.selectionEnd = end + before.length;
        ta.focus();
    }

    // Keyboard shortcuts: Ctrl+B = bold, Ctrl+I = italic, Ctrl+K = link
    ta.addEventListener('keydown', function(e) {
        if (!(e.ctrlKey || e.metaKey)) return;
        if (e.key === 'b') { e.preventDefault(); wrapSelection('**', '**'); }
        if (e.key === 'i') { e.preventDefault(); wrapSelection('_', '_'); }
        if (e.key === 'k') { e.preventDefault(); wrapSelection('[', '](url)'); }
    });

    // Drag-drop file upload
    ta.addEventListener('dragover', function(e) { e.preventDefault(); ta.classList.add('dragover'); });
    ta.addEventListener('dragleave', function() { ta.classList.remove('dragover'); });
    ta.addEventListener('drop', function(e) {
        e.preventDefault();
        ta.classList.remove('dragover');
        var files = e.dataTransfer.files;
        for (var i = 0; i < files.length; i++) uploadFile(files[i]);
    });

    // Paste file upload (images from clipboard, etc.)
    ta.addEventListener('paste', function(e) {
        var items = e.clipboardData && e.clipboardData.items;
        if (!items) return;
        for (var i = 0; i < items.length; i++) {
            if (items[i].kind === 'file') {
                e.preventDefault();
                uploadFile(items[i].getAsFile());
            }
        }
    });

    var previewsEl = document.getElementById('editor-previews');
    var _collections = [];
    try { _collections = JSON.parse(previewsEl.dataset.collections || '[]'); } catch(e) {}

    function collectionSelectHTML() {
        if (!_collections.length) return '';
        var opts = _collections.map(function(c) {
            return '<option value="' + c.url + '">' + c.name + '</option>';
        }).join('');
        return '<div class="editor-preview-collection">' +
            '<select class="form-select editor-preview-coll-select">' +
                '<option value="">Add to collection\u2026</option>' + opts +
            '</select></div>';
    }

    // Poll for AI-generated alt text after upload. Checks every 4s for up to 60s.
    // Updates the preview card and stored markdown when alt text arrives.
    function pollForAlt(card, url) {
        var altEl = card.querySelector('.editor-preview-alt');
        altEl.textContent = 'Waiting for AI description\u2026';
        altEl.className = 'editor-preview-alt polling';
        var attempts = 0;
        var maxAttempts = 15; // 15 * 4s = 60s
        var timer = setInterval(function() {
            attempts++;
            fetch('/media/check-alt?url=' + encodeURIComponent(url))
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.alt) {
                        clearInterval(timer);
                        card.dataset.md = markdownFor(card.dataset.type, url, data.alt, card.dataset.filename);
                        altEl.textContent = data.alt;
                        altEl.className = 'editor-preview-alt found';
                    } else if (attempts >= maxAttempts) {
                        clearInterval(timer);
                        altEl.textContent = 'No AI description found';
                        altEl.className = 'editor-preview-alt not-found';
                    }
                })
                .catch(function() {
                    if (attempts >= maxAttempts) {
                        clearInterval(timer);
                        altEl.textContent = 'No AI description found';
                        altEl.className = 'editor-preview-alt not-found';
                    }
                });
        }, 4000);
    }

    function mediaType(file) {
        if (file.type.startsWith('image/')) return 'image';
        if (file.type.startsWith('video/')) return 'video';
        if (file.type.startsWith('audio/')) return 'audio';
        return 'file';
    }

    function previewHTML(type, url, filename) {
        if (type === 'image') return '<img src="' + url + '" class="editor-preview-thumb" alt="Preview">';
        if (type === 'video') return '<video src="' + url + '" class="editor-preview-thumb" muted playsinline></video>';
        if (type === 'audio') return '<div class="editor-preview-icon"><i class="bi bi-file-music"></i></div><audio src="' + url + '" controls class="editor-preview-audio"></audio>';
        return '<div class="editor-preview-icon"><i class="bi bi-file-earmark"></i></div><span class="editor-preview-filename">' + (filename || 'file') + '</span>';
    }

    function markdownFor(type, url, alt, filename) {
        if (type === 'image') return '![' + (alt || '') + '](' + url + ')';
        if (type === 'video') return '![](' + url + ')';
        return '[' + (filename || url) + '](' + url + ')';
    }

    function uploadFile(file) {
        var dest = document.querySelector('input[name="destination"]').value;
        var type = mediaType(file);
        var filename = file.name;

        // Show a loading preview card immediately
        var card = document.createElement('div');
        card.className = 'editor-preview-card loading';
        card.dataset.type = type;
        card.dataset.filename = filename;
        card.innerHTML = '<div class="editor-preview-thumb-wrap"><span class="editor-preview-loading">Uploading\u2026</span></div>';
        previewsEl.appendChild(card);

        var fd = new FormData();
        fd.append('destination', dest);
        fd.append('media', file, filename);
        fetch('/media/upload', { method: 'POST', body: fd })
            .then(function(r) { return r.text(); })
            .then(function(url) {
                url = url.trim();
                card.className = 'editor-preview-card';
                card.dataset.url = url;
                card.dataset.md = markdownFor(type, url, '', filename);
                card.innerHTML =
                    '<div class="editor-preview-thumb-wrap">' +
                        previewHTML(type, url, filename) +
                        '<button type="button" class="editor-preview-remove" title="Delete">&times;</button>' +
                    '</div>' +
                    '<div class="editor-preview-alt"></div>' +
                    '<div class="editor-preview-actions">' +
                        '<select class="form-select editor-preview-mode">' +
                            '<option value="append">Append to post</option>' +
                            '<option value="prepend">Prepend to post</option>' +
                            '<option value="copy">Copy markdown</option>' +
                        '</select>' +
                        '<button type="button" class="btn btn-glossy btn-sm editor-preview-go">Insert</button>' +
                    '</div>' +
                    (type === 'image' ? collectionSelectHTML() : '');
                // Only poll for AI alt text on images
                if (type === 'image') pollForAlt(card, url);
            })
            .catch(function() {
                card.remove();
            });
    }

    // Update the action button label when the dropdown changes
    previewsEl.addEventListener('change', function(e) {
        if (e.target.matches('.editor-preview-mode')) {
            var btn = e.target.closest('.editor-preview-card').querySelector('.editor-preview-go');
            btn.textContent = e.target.value === 'copy' ? 'Copy' : 'Insert';
        }
        // Add to collection — fires a POST to /collections/add-photo via fetch
        if (e.target.matches('.editor-preview-coll-select')) {
            var collUrl = e.target.value;
            if (!collUrl) return;
            var card = e.target.closest('.editor-preview-card');
            var dest = document.querySelector('input[name="destination"]').value;
            var fd = new FormData();
            fd.append('url', collUrl);
            fd.append('photo', card.dataset.url);
            fd.append('destination', dest);
            fetch('/collections/add-photo', { method: 'POST', body: fd });
            // Visual feedback
            var sel = e.target;
            var chosen = sel.options[sel.selectedIndex].text;
            sel.parentNode.innerHTML = '<small style="color:var(--area-accent)">Added to ' + chosen + '</small>';
        }
    });

    // Preview actions — delegated from the previews container
    previewsEl.addEventListener('click', function(e) {
        var card = e.target.closest('.editor-preview-card');
        if (!card) return;

        // Delete
        if (e.target.closest('.editor-preview-remove')) {
            var dest = document.querySelector('input[name="destination"]').value;
            var fd = new FormData();
            fd.append('destination', dest);
            fd.append('url', card.dataset.url);
            fetch('/media/delete', { method: 'POST', body: fd });
            card.remove();
            return;
        }

        // Insert / Copy
        if (e.target.closest('.editor-preview-go')) {
            var mode = card.querySelector('.editor-preview-mode').value;
            var md = card.dataset.md;
            if (mode === 'append') {
                ta.value = ta.value.trimEnd() + '\n\n' + md;
                growTextArea(ta); updateCharCount();
            } else if (mode === 'prepend') {
                ta.value = md + '\n\n' + ta.value.trimStart();
                growTextArea(ta); updateCharCount();
            } else if (mode === 'copy') {
                navigator.clipboard.writeText(md);
                var btn = card.querySelector('.editor-preview-go');
                btn.textContent = 'Copied!';
                setTimeout(function() { btn.textContent = 'Insert'; }, 1500);
                return;
            }
            card.classList.add('inserted');
        }
    });

    // Badge counts on tag/syndicate dropdown buttons
    function updateBadge(dropdownId) {
        var dd = document.getElementById(dropdownId);
        if (!dd) return;
        var count = dd.querySelectorAll('input[type="checkbox"]:checked').length;
        var badge = dd.querySelector('.editor-badge');
        if (badge) badge.textContent = count || '';
    }
    function updateAllBadges() { updateBadge('categories-dropdown'); updateBadge('syndicates-dropdown'); }
    document.querySelectorAll('.editor-checklist input[type="checkbox"]').forEach(function(cb) {
        cb.addEventListener('change', updateAllBadges);
    });
    updateAllBadges();

    // Collection shortcode insertion — click a collection name to insert its
    // shortcode at the cursor position. With JS this inserts inline; without
    // JS the links are plain anchors (href="#") that do nothing harmful.
    document.addEventListener('click', function(e) {
        var link = e.target.closest('.collection-insert-shortcode');
        if (!link) return;
        e.preventDefault();
        var shortcode = link.dataset.shortcode;
        var pos = ta.selectionStart;
        ta.value = ta.value.slice(0, pos) + shortcode + ta.value.slice(pos);
        ta.selectionStart = ta.selectionEnd = pos + shortcode.length;
        ta.focus();
        growTextArea(ta);
        updateCharCount();
    });

    // Tab key inserts spaces instead of changing focus
    ta.addEventListener('keydown', function(e) {
        if (e.key === 'Tab') {
            e.preventDefault();
            var start = ta.selectionStart;
            ta.value = ta.value.slice(0, start) + '    ' + ta.value.slice(ta.selectionEnd);
            ta.selectionStart = ta.selectionEnd = start + 4;
        }
    });

    // --- Autosave to localStorage ---
    var titleInput = document.querySelector('.editor-title');
    var summaryInput = document.querySelector('.editor-summary');
    var editUrl = document.querySelector('input[name="url"]');
    var dest = document.querySelector('input[name="destination"]');
    var storageKey = 'lh-editor-' + (editUrl ? editUrl.value : 'new-' + (dest ? dest.value : ''));
    var statusEl = document.getElementById('autosave-status');
    var saveTimer = null;

    function autosave() {
        var data = {
            title: titleInput ? titleInput.value : '',
            content: ta.value,
            summary: summaryInput ? summaryInput.value : '',
            ts: Date.now()
        };
        try { localStorage.setItem(storageKey, JSON.stringify(data)); } catch(e) {}
        statusEl.textContent = 'Draft saved';
        statusEl.classList.add('visible');
        setTimeout(function() { statusEl.classList.remove('visible'); }, 2000);
    }

    function scheduleAutosave() {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(autosave, 2000);
    }

    ta.addEventListener('input', scheduleAutosave);
    if (titleInput) titleInput.addEventListener('input', scheduleAutosave);
    if (summaryInput) summaryInput.addEventListener('input', scheduleAutosave);

    // Restore saved draft on load
    try {
        var saved = JSON.parse(localStorage.getItem(storageKey));
        if (saved && saved.content) {
            var hasContent = ta.value.trim() || (titleInput && titleInput.value.trim());
            if (!hasContent || (saved.ts && saved.content !== ta.value)) {
                var age = Date.now() - (saved.ts || 0);
                if (age < 7 * 24 * 60 * 60 * 1000) { // less than 7 days old
                    var banner = document.createElement('div');
                    banner.className = 'editor-restore-banner';
                    banner.innerHTML = '<span>Unsaved draft found</span> <button type="button" class="btn btn-glossy btn-sm" id="restore-draft-btn">Restore</button> <button type="button" class="btn btn-sm" id="dismiss-draft-btn">Dismiss</button>';
                    ta.parentNode.insertBefore(banner, ta);
                    document.getElementById('restore-draft-btn').addEventListener('click', function() {
                        if (saved.title && titleInput) titleInput.value = saved.title;
                        ta.value = saved.content;
                        if (saved.summary && summaryInput) summaryInput.value = saved.summary;
                        growTextArea(ta);
                        updateCharCount();
                        banner.remove();
                    });
                    document.getElementById('dismiss-draft-btn').addEventListener('click', function() {
                        localStorage.removeItem(storageKey);
                        banner.remove();
                    });
                }
            }
        }
    } catch(e) {}

    // Clear draft on form submit (publish, save draft, preview)
    document.querySelector('.editor-form').addEventListener('submit', function() {
        localStorage.removeItem(storageKey);
    });
})();
</script>
