<style>
    .media-row:nth-child(2n) { background-color: var(--crust); }
    .media-row {
        display: flex;
        align-items: center;
    }
    .media-row-main {
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem;
    }
    .media-row-main .tile-content { flex: 1; min-width: 0; }
    .media-row-actions {
        opacity: 0;
        transition: opacity 0.15s;
        flex-shrink: 0;
        display: flex;
        gap: 0.25rem;
        padding-right: 0.75rem;
    }
    .media-row:hover .media-row-actions,
    .media-row-actions:focus-within {
        opacity: 1;
    }
    @media (max-width: 600px) {
        .media-row {
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .media-row::-webkit-scrollbar { display: none; }
        .media-row-main {
            flex: 0 0 100%;
            scroll-snap-align: start;
            position: relative;
        }
        .media-row-main::after {
            content: "\203A";
            position: absolute;
            top: 50%;
            right: 0.5rem;
            transform: translateY(-50%);
            color: var(--overlay-0);
            font-size: 1.2rem;
        }
        .media-row-actions {
            flex: 0 0 auto;
            scroll-snap-align: end;
            opacity: 1;
            padding: 0.75rem;
        }
        /* Clear the bottom-right FAB so the Next paging button isn't hidden behind it. */
        .blog-page {
            padding-bottom: 5rem;
        }
    }
</style>
<div class="container blog-page">
    <div class="blog-toolbar mb-2 mt-2">
        <div class="blog-toolbar-row">
            {{destinationDropdown}}
            <span class="blog-toolbar-spacer"></span>
            <form enctype="multipart/form-data" action="/media/upload" method="POST">
                <input type="hidden" name="destination" value="{{destination}}" />
                <input type="hidden" name="redirect" value="true" />
                <label class="btn btn-glossy">
                    <i class="bi bi-upload"></i> Upload
                    <input type="file" name="media" style="display:none" onchange="this.form.submit()">
                </label>
                <noscript><button type="submit" class="btn btn-glossy">Go</button></noscript>
            </form>
        </div>
        <form method="GET" action="/media" class="mt-2">
            <input type="hidden" name="destination" value="{{destination}}" />
            <div class="input-group">
                <input autocomplete="off" type="search" name="q" value="{{q}}" class="form-input" placeholder="Search uploads..." />
                <button type="submit" class="btn btn-glossy"><i class="bi bi-search"></i></button>
            </div>
        </form>
    </div>

    {{feed}}

    <div class="mt-2 mb-2" style="text-align:right;">
        <a href="{{nextHref}}" class="btn btn-glossy">Next <i class="bi bi-arrow-right"></i></a>
    </div>
</div>
