<div class="card mt-2 book-card">
    <div class="card-header" style="display:flex;align-items:center;gap:1rem;">
        <img width="48" height="74" loading="lazy" src="{{image}}" alt="{{title}} bookcover" style="border-radius:4px;" />
        <div style="flex:1;">
            <a href="/bookshelves/shelf/{{shelfId}}/book/{{id}}" class="tile-title">{{title}}</a>
            <small class="tile-subtitle">{{authors}}</small>
        </div>
    </div>
</div>
