<style>
    .tile:nth-child(2n) {
        background-color: var(--crust)
    }
    .tile-action {
        text-align: right;
    }
    .tile {
        padding: 1em;
    }
</style>
<div class="container mt-2">
    <form method="GET" action="/users/following" class="mb-2">
        <div class="input-group following-search">
            <input type="search" name="q" value="{{searchQuery}}" class="form-input" placeholder="Search Following" />
            <button type="submit" class="btn btn-glossy input-group-btn"><i class="bi bi-search"></i></button>
        </div>
    </form>
    <ul class="tab tab-block mt-2">
        <li class="tab-item {{followingActive}}">
            <a href="/users/following">Following</a>
        </li>
        <li class="tab-item {{mutedActive}}">
            <a href="/users/muted">Muted</a>
        </li>
        <li class="tab-item {{blockedActive}}">
            <a href="/users/blocked">Blocked</a>
        </li>
    </ul>
    <br/>
    {{message}}
    {{feed}}
</div>
