<div class="card mt-2 note-card" data-type="note">
    <div class="card-header">
        <a href="/notes/{{notebookId}}/{{id}}" class="tile-title note-title-text noteLink"></a>
        <small class="tile-subtitle">{{formattedDate}}</small>
        {{is_shared}}
        <span class="tags"></span>
    </div>
    <div class="card-body" style="display:none;">{{content}}</div>
</div>
