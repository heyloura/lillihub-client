<script src="https://cdn.jsdelivr.net/npm/showdown@2.0.3/dist/showdown.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js" defer></script>
<div class="container">
    {{errorBanner}}
    <noscript>
        <p class="mt-2 mb-2"><mark>Notes require JavaScript for client-side encryption.</mark></p>
    </noscript>
    <div id="enter_notes_key" class="mt-2 mb-2" style="display:none;">
        <p>Enter your secret key to access your notes.</p>
        <div class="input-group">
            <input id="notes_key" type="text" class="form-input" placeholder="Micro.blog Key">
            <button class="btn btn-glossy" id="saveKeyBtn"><i class="bi bi-save"></i></button>
        </div>
        <div id="hide_notes_key" style="display:none;">
            <p class="mt-2"><button class="btn btn-link" id="clearKeyBtn"><i class="bi bi-trash"></i> Clear your secret key</button></p>
        </div>
    </div>
    <div id="notes_content" style="display:none;">
        <ul class="tab tab-block mt-2 mb-2">
            <li class="tab-item {{notesActive}}"><a href="/notes/{{notebookId}}"><i class="bi bi-journal-text"></i> Notes</a></li>
            <li class="tab-item {{todosActive}}"><a href="/notes/{{notebookId}}?tab=todos"><i class="bi bi-check2-square"></i> Todo lists</a></li>
        </ul>
        <div class="blog-toolbar mb-2">
            <div class="input-group">
                <input list="noteTags" type="search" id="searchbox" class="form-input" placeholder="Search notes..." />
                <button type="button" class="btn btn-glossy"><i class="bi bi-search"></i></button>
            </div>
        </div>
        <datalist id="noteTags"></datalist>
        <div class="notes-select-toolbar mb-2 hide-if-user-has-no-javascript" id="notes-select-toolbar" style="display:none;">
            <label class="highlight-select-all">
                <input type="checkbox" id="note-select-all-cb" /> <small>Select all</small>
            </label>
            <span class="blog-toolbar-spacer"></span>
            <button type="button" class="btn btn-glossy btn-sm" id="post-selected-btn" style="display:none;"><i class="bi bi-pencil-square"></i> Create post</button>
            <button type="button" class="btn btn-glossy btn-sm" id="tags-selected-btn" style="display:none;"><i class="bi bi-tags"></i> Edit tags</button>
            <button type="button" class="btn btn-glossy btn-sm" id="delete-selected-btn" style="display:none;"><i class="bi bi-trash"></i> Delete</button>
        </div>
        <form id="notes-post-form" method="POST" action="/notes/post-selected" style="display:none;"></form>

        <dialog id="bulk-tags-dialog" class="hide-if-user-has-no-javascript" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);border:1px solid var(--border);border-radius:6px;padding:1rem;max-width:480px;width:90%;background:var(--base);color:var(--text);">
            <form id="bulk-tags-form">
                <h5 style="margin-top:0;">Replace tags</h5>
                <p style="font-size:0.85rem;color:var(--overlay-1);" id="bulk-tags-message">
                    The tags below will become the complete tag list for each selected note. Anything not listed here will be removed.
                </p>
                <input id="bulk-tags-input" class="form-input" type="text" placeholder="Tags (comma separated)">
                <div class="mt-2" style="display:flex;gap:0.5rem;justify-content:flex-end;">
                    <button type="button" class="btn btn-sm" id="bulk-tags-cancel">Cancel</button>
                    <button type="submit" class="btn btn-glossy btn-sm"><i class="bi bi-check-lg"></i> Apply</button>
                </div>
            </form>
        </dialog>
        <div style="margin-top:2em;">
        {{notes}}
        </div>

        <dialog id="new-todo-dialog" class="hide-if-user-has-no-javascript" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);border:1px solid var(--border);border-radius:6px;padding:1rem;max-width:420px;width:90%;background:var(--base);color:var(--text);">
            <form id="new-todo-form">
                <h5 style="margin-top:0;">New Todo List</h5>
                <input id="new-todo-title" class="form-input" type="text" placeholder="Title" required maxlength="200">
                <div class="mt-2" style="display:flex;gap:0.5rem;justify-content:flex-end;">
                    <button type="button" class="btn btn-sm" id="new-todo-cancel">Cancel</button>
                    <button type="submit" class="btn btn-glossy btn-sm"><i class="bi bi-check-lg"></i> Create</button>
                </div>
            </form>
        </dialog>

        <details class="mt-2 pt-2" style="margin: 2em 0">
            <summary style="cursor:pointer;font-size:0.85rem;color:var(--overlay-1);list-style:none;"><i class="bi bi-three-dots"></i> Advanced actions</summary>
            <div class="mt-2" style="display:flex;gap:0.5rem;flex-wrap:wrap;">
                <button class="btn btn-glossy btn-sm" id="exportNotesBtn"><i class="bi bi-download"></i> Export notes as zip</button>
            </div>
        </details>
    </div>

    <script type="module">
        import { importNotesKey, decryptWithKey, encryptWithKey, validateNotesKey } from '/scripts/crypto.js';
        import { initNoteSlideout } from '/scripts/note-slideout.js';

        const key = await importNotesKey();
        if (key) {
            document.getElementById('enter_notes_key').style.display = 'none';
            document.getElementById('hide_notes_key').style.display = 'block';
            document.getElementById('notes_content').style.display = 'block';
        } else {
            document.getElementById('enter_notes_key').style.display = 'block';
        }

        document.getElementById('saveKeyBtn')?.addEventListener('click', () => {
            const value = document.getElementById('notes_key').value.trim();
            const err = validateNotesKey(value);
            if (err) { alert(err); return; }
            localStorage.setItem('notes_key', value);
            window.location.reload();
        });
        document.getElementById('clearKeyBtn')?.addEventListener('click', () => {
            localStorage.setItem('notes_key', '');
            window.location.href = '/notes';
        });

        // Search
        document.getElementById('searchbox')?.addEventListener('input', function() {
            const q = this.value.toLowerCase();
            document.querySelectorAll('.note-card').forEach(card => {
                if (card.style.display === 'none' && !card.hasAttribute('data-search-hidden')) return;
                const match = card.innerText.toLowerCase().includes(q);
                card.style.display = match ? '' : 'none';
                if (!match) card.setAttribute('data-search-hidden', '');
                else card.removeAttribute('data-search-hidden');
            });
        });

        const activeTab = '{{tab}}';

        function decodeEntities(str) {
            const el = document.createElement('span');
            el.innerHTML = str;
            return el.textContent;
        }

        // Process notes: decrypt encrypted ones, extract titles for shared ones
        async function processNotes() {
            const datalist = new Set();
            const cards = document.querySelectorAll('.note');
            for (const el of cards) {
                const card = el.closest('.note-card');
                const titleEl = card.querySelector('.note-title-text');

                // Handle shared (unencrypted) notes
                if (!el.classList.contains('decryptMe')) {
                    const plainText = (el.textContent || '').trim();
                    titleEl.textContent = plainText.length > 60
                        ? plainText.substring(0, 60) + '...'
                        : plainText;
                    // Store an export-friendly markdown that keeps the shared
                    // URL alongside the visible text. Without this, shared
                    // notes would be dropped from the export zip.
                    const sharedAnchor = card.querySelector('a.chip[href]');
                    const sharedUrl = sharedAnchor ? sharedAnchor.getAttribute('href') : '';
                    const body = plainText;
                    const md = sharedUrl ? `[Shared on Micro.blog](${sharedUrl})\n\n${body}` : body;
                    el.setAttribute('data-markdown', md);
                    continue;
                }

                if (!key) continue;

                const converter = new showdown.Converter({
                    metadata: true, parseImgDimensions: true, strikethrough: true,
                    tables: true, ghCodeBlocks: true, smoothLivePreview: true,
                    simpleLineBreaks: true, emoji: true,
                });
                const markdown = await decryptWithKey(key, el.innerHTML);
                el.setAttribute('data-markdown', markdown);
                const html = converter.makeHtml(markdown);
                const metadata = converter.getMetadata();
                const isTodo = metadata?.type === 'todo.txt';

                // Set title or excerpt
                if (metadata?.title) {
                    const decodedTitle = decodeEntities(metadata.title);
                    titleEl.textContent = decodedTitle;
                    el.setAttribute('data-title', decodedTitle);
                } else {
                    const tmp = document.createElement('div');
                    tmp.innerHTML = html;
                    const plainText = (tmp.textContent || '').trim();
                    titleEl.textContent = plainText.length > 60
                        ? plainText.substring(0, 60) + '...'
                        : plainText;
                }

                // Set tags
                if (metadata?.tags) {
                    const tags = metadata.tags.replace('[','').replace(']','').split(',');
                    card.querySelector('.tags').innerHTML = tags.map(t => {
                        datalist.add(t);
                        return `<span class="chip">#${t}</span>`;
                    }).join('');
                }

                // Mark todo type on the card and update link
                if (isTodo) {
                    card.setAttribute('data-type', 'todo');
                    const link = card.querySelector('.noteLink');
                    if (link) link.href = link.href + '?type=todo';
                }

                // Store rendered HTML for the view page (kept hidden for search)
                el.innerHTML = html;
            }

            // Filter by active tab
            document.querySelectorAll('.note-card').forEach(card => {
                const type = card.getAttribute('data-type');
                if (activeTab === 'notes' && type === 'todo') {
                    card.style.display = 'none';
                } else if (activeTab === 'todos' && type !== 'todo') {
                    card.style.display = 'none';
                }
            });

            datalist.forEach(value => {
                const option = document.createElement('option');
                option.value = `#${value}`;
                document.getElementById('noteTags').appendChild(option);
            });
            if (typeof hljs !== 'undefined') hljs.highlightAll();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', processNotes);
        } else {
            await processNotes();
        }

        // Clicking anywhere in a card activates the title link. For notes that
        // runs through the slideout intercept in note-slideout.js; for todos it
        // falls through to a normal navigation. Interactive children (checkbox,
        // chips, advanced-actions details) keep their own behavior.
        document.querySelectorAll('.note-card').forEach(card => {
            card.style.cursor = 'pointer';
            card.addEventListener('click', (e) => {
                if (e.target.closest('a, button, input, label, .chip, details')) return;
                const link = card.querySelector('.noteLink');
                if (link) link.click();
            });
        });

        // --- Keyboard shortcuts (notes page only) ---
        // The global handler in common.js keys off .content > .card; note-cards
        // live deeper so we own navigation here without clashing.
        let _noteKbIdx = -1;
        function _visibleNoteCards() {
            return [...document.querySelectorAll('.note-card')].filter(c => c.style.display !== 'none');
        }
        function _focusNoteCard(idx) {
            const cards = _visibleNoteCards();
            if (!cards.length) return;
            document.querySelectorAll('.note-card.kb-focus').forEach(c => c.classList.remove('kb-focus'));
            if (idx < 0) idx = 0;
            if (idx >= cards.length) idx = cards.length - 1;
            _noteKbIdx = idx;
            cards[idx].classList.add('kb-focus');
            cards[idx].scrollIntoView({ block: 'center', behavior: 'smooth' });
        }
        document.addEventListener('keydown', (e) => {
            if (e.target.matches('input, textarea, select, [contenteditable]')) return;
            if (e.ctrlKey || e.metaKey || e.altKey) return;
            const cards = _visibleNoteCards();
            switch (e.key) {
                case 'j': if (cards.length) { e.preventDefault(); _focusNoteCard(_noteKbIdx + 1); } break;
                case 'k': if (cards.length) { e.preventDefault(); _focusNoteCard(_noteKbIdx - 1); } break;
                case 'o':
                case 'Enter': {
                    if (_noteKbIdx >= 0 && cards[_noteKbIdx]) {
                        e.preventDefault();
                        const link = cards[_noteKbIdx].querySelector('.noteLink');
                        if (link) link.click();
                    }
                    break;
                }
                case 'x': {
                    if (_noteKbIdx >= 0 && cards[_noteKbIdx]) {
                        e.preventDefault();
                        const cb = cards[_noteKbIdx].querySelector('.note-select-cb');
                        if (cb) { cb.checked = !cb.checked; cb.dispatchEvent(new Event('change', { bubbles: true })); }
                    }
                    break;
                }
                case '/': {
                    e.preventDefault();
                    document.getElementById('searchbox')?.focus();
                    break;
                }
                case 'n': {
                    // Context-sensitive: notes tab -> new note, todos tab -> new todo list modal.
                    e.preventDefault();
                    if (activeTab === 'todos') openNewTodoDialog();
                    else window.location.href = '/notes/{{notebookId}}/new';
                    break;
                }
            }
        });

        // Clicking a tag chip (e.g. "#work") on a card fills the search box
        // and filters. Other chips (like the "shared" indicator) keep their
        // default link/click behavior.
        document.addEventListener('click', (e) => {
            const chip = e.target.closest('.note-card .chip');
            if (!chip) return;
            const text = chip.textContent.trim();
            if (!text.startsWith('#')) return;
            e.preventDefault();
            e.stopPropagation();
            const searchbox = document.getElementById('searchbox');
            if (!searchbox) return;
            searchbox.value = text;
            searchbox.dispatchEvent(new Event('input', { bubbles: true }));
        });

        if (key) initNoteSlideout('{{notebookId}}', key, JSON.parse('{{notebooksJson}}'));

        // --- Multi-select: create post from notes ---
        if (activeTab === 'notes') {
            document.getElementById('notes-select-toolbar').style.display = '';

            const postSelectedBtn = document.getElementById('post-selected-btn');
            const tagsSelectedBtn = document.getElementById('tags-selected-btn');
            const deleteSelectedBtn = document.getElementById('delete-selected-btn');
            function updatePostBtnVisibility() {
                const anyChecked = !!document.querySelector('.note-card:not([style*="display: none"]) .note-select-cb:checked');
                const display = anyChecked ? '' : 'none';
                postSelectedBtn.style.display = display;
                tagsSelectedBtn.style.display = display;
                deleteSelectedBtn.style.display = display;
            }

            function getSelectedCards() {
                return [...document.querySelectorAll('.note-card')].filter(card => {
                    if (card.style.display === 'none') return false;
                    const cb = card.querySelector('.note-select-cb');
                    return cb && cb.checked;
                });
            }

            deleteSelectedBtn.addEventListener('click', async () => {
                const cards = getSelectedCards();
                if (!cards.length) return;
                if (!confirm(`Delete ${cards.length} note${cards.length > 1 ? 's' : ''}? This cannot be undone.`)) return;
                deleteSelectedBtn.disabled = true;
                try {
                    const results = await Promise.all(cards.map(card => {
                        const noteEl = card.querySelector('.note');
                        const id = noteEl?.getAttribute('data-note-id');
                        if (!id) return Promise.resolve({ ok: false, card });
                        const form = new URLSearchParams();
                        form.append('id', id);
                        form.append('notebookId', '{{notebookId}}');
                        return fetch('/note/delete', {
                            method: 'POST',
                            body: form.toString(),
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded; charset=utf-8' }
                        }).then(res => ({ ok: !res.url?.includes('error='), card }), () => ({ ok: false, card }));
                    }));
                    let failed = 0;
                    const failedCards = [];
                    for (const r of results) {
                        if (r.ok) r.card.remove();
                        else {
                            failed++;
                            r.card.classList.add('op-failed');
                            failedCards.push(r.card);
                        }
                    }
                    document.getElementById('note-select-all-cb').checked = false;
                    updatePostBtnVisibility();
                    // Removing cards shifts indices — reset keyboard focus.
                    _noteKbIdx = -1;
                    if (failedCards.length) {
                        setTimeout(() => failedCards.forEach(c => c.classList.remove('op-failed')), 6000);
                    }
                    if (failed) alert(`${failed} note${failed > 1 ? 's' : ''} could not be deleted. The failed item${failed > 1 ? 's are' : ' is'} highlighted.`);
                } finally {
                    deleteSelectedBtn.disabled = false;
                }
            });

            // --- Bulk tag replace ---
            const bulkTagsDialog = document.getElementById('bulk-tags-dialog');
            const bulkTagsInput = document.getElementById('bulk-tags-input');
            const bulkTagsMessage = document.getElementById('bulk-tags-message');
            const bulkTagsForm = document.getElementById('bulk-tags-form');

            function parseTagsAttr(md) {
                const fmMatch = md.match(/^---\n([\s\S]*?)\n---\n?/);
                if (!fmMatch) return [];
                const tagsMatch = fmMatch[1].match(/^tags:\s*\[?(.*?)\]?\s*$/m);
                if (!tagsMatch) return [];
                return tagsMatch[1].split(',').map(t => t.trim()).filter(Boolean);
            }

            function writeTagsIntoMarkdown(md, tagsCsv) {
                const fmMatch = md.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
                if (fmMatch) {
                    let fm = fmMatch[1];
                    if (/^tags:/m.test(fm)) {
                        fm = fm.replace(/^tags:.*$/m, tagsCsv ? `tags: [${tagsCsv}]` : '').replace(/\n\n+/g, '\n').replace(/\n$/, '');
                    } else if (tagsCsv) {
                        fm = fm + `\ntags: [${tagsCsv}]`;
                    }
                    fm = fm.trim();
                    return fm ? `---\n${fm}\n---\n${fmMatch[2]}` : fmMatch[2];
                }
                if (!tagsCsv) return md;
                return `---\ntags: [${tagsCsv}]\n---\n` + md;
            }

            tagsSelectedBtn.addEventListener('click', () => {
                if (!key) { alert('Enter your secret key first.'); return; }
                const cards = getSelectedCards();
                if (!cards.length) return;
                const union = new Set();
                for (const card of cards) {
                    const md = card.querySelector('.note')?.getAttribute('data-markdown') || '';
                    for (const t of parseTagsAttr(md)) union.add(t);
                }
                bulkTagsInput.value = [...union].join(', ');
                bulkTagsMessage.textContent = `The tags below will become the complete tag list for each of the ${cards.length} selected note${cards.length > 1 ? 's' : ''}. Anything not listed here will be removed.`;
                bulkTagsDialog.showModal();
                setTimeout(() => bulkTagsInput.focus(), 50);
            });

            document.getElementById('bulk-tags-cancel').addEventListener('click', () => bulkTagsDialog.close());
            bulkTagsDialog.addEventListener('click', (e) => { if (e.target === bulkTagsDialog) bulkTagsDialog.close(); });

            bulkTagsForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                if (!key) return;
                const submitBtn = bulkTagsForm.querySelector('button[type="submit"]');
                const cards = getSelectedCards();
                if (!cards.length) { bulkTagsDialog.close(); return; }
                const csv = bulkTagsInput.value.split(',').map(t => t.trim()).filter(Boolean).join(',');

                submitBtn.disabled = true;
                const originalMessage = bulkTagsMessage.textContent;
                bulkTagsMessage.textContent = `Applying tags to ${cards.length} note${cards.length > 1 ? 's' : ''}…`;
                try {
                    const results = await Promise.all(cards.map(async (card) => {
                        try {
                            const noteEl = card.querySelector('.note');
                            const id = noteEl?.getAttribute('data-note-id');
                            const md = noteEl?.getAttribute('data-markdown') || '';
                            if (!id) return { ok: false, card };
                            const updated = writeTagsIntoMarkdown(md, csv);
                            const encrypted = await encryptWithKey(key, updated);
                            const form = new URLSearchParams();
                            form.append('text', encrypted);
                            form.append('notebook_id', '{{notebookId}}');
                            form.append('id', id);
                            const res = await fetch('/note/update', {
                                method: 'POST',
                                body: form.toString(),
                                headers: { 'Content-Type': 'application/x-www-form-urlencoded; charset=utf-8' }
                            });
                            if (!res.ok) return { ok: false, card };
                            // Update DOM + data-markdown so further bulk ops see the new state.
                            noteEl.setAttribute('data-markdown', updated);
                            const tags = csv ? csv.split(',').map(t => t.trim()).filter(Boolean) : [];
                            card.querySelector('.tags').innerHTML = tags.map(t => `<span class="chip">#${t}</span>`).join('');
                            return { ok: true, card };
                        } catch {
                            return { ok: false, card };
                        }
                    }));
                    const failedCards = results.filter(r => !r.ok).map(r => r.card).filter(Boolean);
                    for (const c of failedCards) c.classList.add('op-failed');
                    if (failedCards.length) {
                        setTimeout(() => failedCards.forEach(c => c.classList.remove('op-failed')), 6000);
                    }
                    const failed = failedCards.length;
                    bulkTagsDialog.close();
                    bulkTagsMessage.textContent = originalMessage;
                    if (failed) alert(`Tags updated on ${results.length - failed} of ${results.length} notes. ${failed} failed and ${failed > 1 ? 'are' : 'is'} highlighted.`);
                } finally {
                    submitBtn.disabled = false;
                }
            });

            document.getElementById('note-select-all-cb').addEventListener('change', function() {
                const checked = this.checked;
                document.querySelectorAll('.note-card').forEach(card => {
                    if (card.style.display === 'none') return;
                    const cb = card.querySelector('.note-select-cb');
                    if (cb) cb.checked = checked;
                });
                updatePostBtnVisibility();
            });

            document.addEventListener('change', function(e) {
                if (e.target && e.target.classList && e.target.classList.contains('note-select-cb')) {
                    updatePostBtnVisibility();
                }
            });

            postSelectedBtn.addEventListener('click', function() {
                const form = document.getElementById('notes-post-form');
                form.innerHTML = '';
                let count = 0;
                document.querySelectorAll('.note-card').forEach(card => {
                    if (card.style.display === 'none') return;
                    const cb = card.querySelector('.note-select-cb');
                    if (!cb || !cb.checked) return;
                    const noteEl = card.querySelector('.note');
                    let md = noteEl?.getAttribute('data-markdown') || '';
                    // Strip YAML frontmatter
                    md = md.replace(/^---\n[\s\S]*?\n---\n?/, '').trim();
                    if (!md) return;
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = 'selected[]';
                    input.value = md;
                    form.appendChild(input);
                    count++;
                });
                if (count === 0) { alert('No notes selected.'); return; }
                form.submit();
            });
        } else {
            // Hide checkboxes on todos tab
            document.querySelectorAll('.note-select').forEach(el => el.style.display = 'none');
        }

        document.getElementById('exportNotesBtn')?.addEventListener('click', async () => {
            const zip = new JSZip();
            const cards = document.querySelectorAll('.note-card');
            let count = 0;
            for (const card of cards) {
                if (card.style.display === 'none') continue;
                const noteEl = card.querySelector('.note');
                const markdown = noteEl?.getAttribute('data-markdown');
                if (!markdown) continue;
                const titleText = card.querySelector('.note-title-text')?.textContent?.trim() || `note-${count + 1}`;
                const safeName = titleText.replace(/[^a-zA-Z0-9 _-]/g, '').substring(0, 60).trim() || `note-${count + 1}`;
                zip.file(`${safeName}.md`, markdown);
                count++;
            }
            if (count === 0) { alert('No notes to export.'); return; }
            const blob = await zip.generateAsync({ type: 'blob' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'notes-export.zip';
            a.click();
            URL.revokeObjectURL(url);
        });

        // --- New Todo List modal ---
        const newTodoDialog = document.getElementById('new-todo-dialog');
        const newTodoTitle = document.getElementById('new-todo-title');
        const newTodoForm = document.getElementById('new-todo-form');

        function openNewTodoDialog() {
            if (!key) { alert('Enter your secret key first.'); return; }
            newTodoTitle.value = '';
            if (typeof newTodoDialog.showModal === 'function') {
                newTodoDialog.showModal();
            } else {
                newTodoDialog.setAttribute('open', '');
            }
            setTimeout(() => newTodoTitle.focus(), 50);
        }

        document.addEventListener('click', function(e) {
            const trigger = e.target.closest('[data-new-todo-list]');
            if (trigger) {
                e.preventDefault();
                openNewTodoDialog();
            }
        });

        document.getElementById('new-todo-cancel')?.addEventListener('click', () => newTodoDialog.close());
        newTodoDialog?.addEventListener('click', (e) => { if (e.target === newTodoDialog) newTodoDialog.close(); });

        newTodoForm?.addEventListener('submit', async function(e) {
            e.preventDefault();
            const title = newTodoTitle.value.trim();
            if (!title || !key) return;

            const note = `---\ntype: todo.txt\ntitle: ${title}\n---\n`;
            const encrypted = await encryptWithKey(key, note);

            const form = new URLSearchParams();
            form.append('text', encrypted);
            form.append('notebook_id', '{{notebookId}}');

            const submitBtn = newTodoForm.querySelector('button[type="submit"]');
            if (submitBtn) submitBtn.disabled = true;

            try {
                const res = await fetch('/note/update?json=1', {
                    method: 'POST',
                    body: form.toString(),
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded; charset=utf-8',
                        'Accept': 'application/json'
                    }
                });
                const data = await res.json().catch(() => ({}));
                newTodoDialog.close();
                if (data && data.id) {
                    window.location.href = `/notes/{{notebookId}}/${data.id}?type=todo`;
                } else {
                    window.location.href = `/notes/{{notebookId}}?tab=todos`;
                }
            } catch (err) {
                alert('Could not create todo list. Please try again.');
                if (submitBtn) submitBtn.disabled = false;
            }
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</div>
