<script src="https://cdn.jsdelivr.net/npm/showdown@2.0.3/dist/showdown.min.js" defer></script>
<div class="container">
    <div id="enter_notes_key" class="mt-2 mb-2" style="display:none;">
        <p>Enter your secret key to access your notes.</p>
        <div class="input-group">
            <input id="notes_key" type="text" class="form-input" placeholder="Micro.blog Key">
            <button class="btn btn-glossy-orange" id="saveKeyBtn"><i class="bi bi-save"></i></button>
        </div>
    </div>
    <div id="todo_view" style="display:none;"
         data-notebook-id="{{notebookId}}"
         data-note-id="{{noteId}}">

        <div class="mt-2 mb-2" style="display:flex;gap:0.5rem;align-items:center;">
            <button class="btn btn-glossy-orange btn-sm" id="addTodoBtn"><i class="bi bi-plus-lg"></i> Add</button>
            <a href="/notes/{{notebookId}}/update?id={{noteId}}" class="btn btn-glossy-orange btn-sm"><i class="bi bi-pencil"></i> Edit Raw</a>
            {{sharedChip}}
        </div>

        <div class="blog-toolbar mb-2">
            <div class="input-group">
                <input type="search" id="todo-search" class="form-input" placeholder="Search todos..." />
                <button type="button" class="btn btn-glossy-orange"><i class="bi bi-search"></i></button>
            </div>
        </div>

        <div class="mb-2" style="display:flex;align-items:center;gap:0.5rem;">
            <label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;font-size:0.85rem;">
                <input id="showCompleted" type="checkbox"> Show completed
            </label>
        </div>

        <ul id="tasks" class="todo-list">
            <li style="text-align:center;padding:1rem;"><i class="bi bi-arrow-repeat"></i> Decrypting...</li>
        </ul>

        <div class="mt-2 pt-2" style="border-top:1px solid var(--border);display:flex;gap:0.5rem;flex-wrap:wrap;">
            {{versionsButton}}
            <details style="display:inline;">
                <summary class="btn btn-glossy-orange btn-sm" style="list-style:none;"><i class="bi bi-trash"></i> Delete</summary>
                <form method="POST" action="/note/delete" class="mt-2">
                    <input type="hidden" name="id" value="{{noteId}}" />
                    <input type="hidden" name="notebookId" value="{{notebookId}}" />
                    <p style="font-size:0.85rem;color:var(--overlay-1);">This will permanently delete this note.</p>
                    <button type="submit" class="btn btn-glossy-orange btn-sm">Confirm Delete</button>
                </form>
            </details>
        </div>
    </div>

    <dialog id="todo-dialog" class="todo-dialog">
        <div class="todo-dialog-header">
            <h5 style="margin:0;">Todo</h5>
            <button id="closeTodoDialog" class="btn btn-sm" style="border:none;background:none;font-size:1.2rem;cursor:pointer;"><i class="bi bi-x-lg"></i></button>
        </div>
        <textarea id="todo-content" class="form-input mt-2" placeholder="Write a task..." style="min-height:120px;"></textarea>
        <div class="mt-2" style="display:flex;justify-content:space-between;">
            <div style="display:flex;gap:0.5rem;">
                <button id="deleteTodoBtn" class="btn btn-sm" style="color:var(--red);display:none;"><i class="bi bi-trash"></i></button>
                <button id="moveBottomBtn" class="btn btn-sm" style="display:none;" title="Move to bottom of list"><i class="bi bi-arrow-down-circle"></i></button>
            </div>
            <button id="saveTodoBtn" class="btn btn-glossy-orange btn-sm"><i class="bi bi-check-lg"></i> Save</button>
        </div>
    </dialog>
</div>

<script type="module">
    import { importNotesKey, decryptWithKey, encryptWithKey } from '/scripts/crypto.js';
    import { initTodo } from '/scripts/todo.js';

    const key = await importNotesKey();
    if (key) {
        document.getElementById('todo_view').style.display = 'block';
    } else {
        document.getElementById('enter_notes_key').style.display = 'block';
    }

    document.getElementById('saveKeyBtn')?.addEventListener('click', () => {
        localStorage.setItem('notes_key', document.getElementById('notes_key').value);
        window.location.reload();
    });

    if (key) {
        const encrypted = '{{content}}';
        const markdown = await decryptWithKey(key, encrypted);
        initTodo(markdown, key, '{{notebookId}}', '{{noteId}}');
    }
</script>
