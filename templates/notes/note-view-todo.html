<style>.fab { display: none; }</style>
<script src="https://cdn.jsdelivr.net/npm/showdown@2.0.3/dist/showdown.min.js" defer></script>
<div class="container">
    <div id="enter_notes_key" class="mt-2 mb-2" style="display:none;">
        <p>Enter your secret key to access your notes.</p>
        <div class="input-group">
            <input id="notes_key" type="text" class="form-input" placeholder="Micro.blog Key">
            <button class="btn btn-glossy" id="saveKeyBtn"><i class="bi bi-save"></i></button>
        </div>
    </div>
    <div id="todo_view" style="display:none;"
         data-notebook-id="{{notebookId}}"
         data-note-id="{{noteId}}">

        <div class="mt-2 mb-2" style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;">
            <button class="btn btn-glossy btn-sm" id="addTodoBtn"><i class="bi bi-plus-lg"></i> Add</button>
            <button class="btn btn-glossy btn-sm" id="startFvBtn"><i class="bi bi-bullseye"></i> Start Round</button>
            <button class="btn btn-glossy btn-sm" id="clearCompletedBtn"><i class="bi bi-trash"></i> Clear Done</button>
            {{sharedChip}}
        </div>

        <div class="blog-toolbar mb-2">
            <div class="input-group">
                <input type="search" id="todo-search" class="form-input" placeholder="Search todos..." />
                <button type="button" class="btn btn-glossy"><i class="bi bi-search"></i></button>
            </div>
        </div>

        <div class="mb-2" style="display:flex;align-items:center;gap:0.5rem;">
            <label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;font-size:0.85rem;">
                <input id="showCompleted" type="checkbox"> Show completed
            </label>
        </div>

        <ul id="tasks" class="todo-list">
            <li style="text-align:center;padding:1rem;"><i class="bi bi-arrow-repeat"></i> Decrypting...</li>
        </ul>

        <details class="mt-2 pt-2" style="border-top:1px solid var(--border);">
            <summary style="cursor:pointer;font-size:0.85rem;color:var(--overlay-1);list-style:none;"><i class="bi bi-three-dots"></i> Advanced actions</summary>
            <div class="mt-2" style="display:flex;gap:0.5rem;flex-wrap:wrap;">
                {{versionsButton}}
                <button class="btn btn-glossy btn-sm" id="exportTodoBtn"><i class="bi bi-download"></i> Export</button>
                <details style="display:inline;">
                    <summary class="btn btn-glossy btn-sm" style="list-style:none;"><i class="bi bi-trash"></i> Delete todo list</summary>
                    <form method="POST" action="/note/delete" class="mt-2" onsubmit="return confirm('Permanently delete this todo list and all its tasks?')">
                        <input type="hidden" name="id" value="{{noteId}}" />
                        <input type="hidden" name="notebookId" value="{{notebookId}}" />
                        <p style="font-size:0.85rem;color:var(--overlay-1);">This will permanently delete this todo list and all its tasks.</p>
                        <button type="submit" class="btn btn-glossy btn-sm">Confirm Delete</button>
                    </form>
                </details>
            </div>
        </details>
    </div>

    <div id="todo-slideout-scrim" class="todo-slideout-scrim"></div>
    <div id="todo-slideout" class="todo-slideout" aria-hidden="true">
        <div class="todo-slideout-header">
            <h5 id="todo-slideout-title" style="margin:0;">Add Task</h5>
            <button id="closeTodoDialog" class="btn btn-sm" style="border:none;background:none;font-size:1.2rem;cursor:pointer;"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="todo-slideout-body">
            <textarea id="todo-content" class="form-input" placeholder="Write a task..." style="min-height:150px;"></textarea>
            <p class="todo-slideout-hint">Each line becomes a separate task.</p>
        </div>
        <div class="todo-slideout-footer">
            <div style="display:flex;gap:0.5rem;">
                <button id="deleteTodoBtn" class="btn btn-sm" style="color:var(--red);display:none;"><i class="bi bi-trash"></i></button>
                <button id="moveBottomBtn" class="btn btn-sm" style="display:none;" title="Move to bottom"><i class="bi bi-arrow-down-circle"></i></button>
            </div>
            <button id="saveTodoBtn" class="btn btn-glossy btn-sm"><i class="bi bi-check-lg"></i> Save</button>
        </div>
    </div>
</div>

<script type="module">
    import { importNotesKey, decryptWithKey, encryptWithKey } from '/scripts/crypto.js';
    import { initTodo } from '/scripts/todo.js';

    const key = await importNotesKey();
    if (key) {
        document.getElementById('todo_view').style.display = 'block';
    } else {
        document.getElementById('enter_notes_key').style.display = 'block';
    }

    document.getElementById('saveKeyBtn')?.addEventListener('click', () => {
        localStorage.setItem('notes_key', document.getElementById('notes_key').value);
        window.location.reload();
    });

    if (key) {
        const encrypted = '{{content}}';
        const markdown = await decryptWithKey(key, encrypted);
        initTodo(markdown, key, '{{notebookId}}', '{{noteId}}');
    }
</script>
