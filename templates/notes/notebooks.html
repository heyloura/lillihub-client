<div class="container mt-2">
    {{errorBanner}}
    <noscript>
        <p class="mt-2 mb-2"><mark>Notes require JavaScript for client-side encryption.</mark></p>
    </noscript>
    <div id="enter_notes_key" class="mt-2 mb-2" style="display:none;">
        <p>Notes are encrypted in the browser before sending them to the server, so neither Lillihub nor Micro.blog sees the note text.</p>
        <p>Enter your secret key to access your notes. The key is saved in your browser's local storage and is never sent to Lillihub.</p>
        <div class="input-group">
            <input id="notes_key" type="text" class="form-input" placeholder="Micro.blog Key">
            <button class="btn btn-glossy" id="saveKeyBtn"><i class="bi bi-save"></i></button>
        </div>
        <div id="hide_notes_key" style="display:none;">
            <p class="mt-2"><button class="btn btn-link" id="clearKeyBtn"><i class="bi bi-trash"></i> Clear your secret key</button></p>
        </div>
    </div>
    <div id="notebooks_content" style="display:none;">
        <h1>My Notebooks</h1>
        {{notebooks}}
    </div>
</div>

<dialog id="notebook-dialog" class="notebook-dialog hide-if-user-has-no-javascript">
    <div class="notebook-dialog-header">
        <h3 id="notebook-dialog-title"></h3>
        <button type="button" id="notebook-dialog-close" aria-label="Close"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="notebook-dialog-body">
        <label class="notebook-dialog-label">Rename</label>
        <div class="input-group">
            <input type="text" id="notebook-dialog-name" class="form-input" required />
            <button type="button" class="btn btn-glossy btn-sm" id="notebook-dialog-rename-btn">Save</button>
        </div>
        <button type="button" class="btn btn-glossy btn-sm mt-2" id="notebook-dialog-delete-btn"><i class="bi bi-trash"></i> Delete notebook</button>
    </div>
</dialog>

<script type="module">
    import { importNotesKey, validateNotesKey } from '/scripts/crypto.js';
    const key = await importNotesKey();
    if (key) {
        document.getElementById('enter_notes_key').style.display = 'none';
        document.getElementById('hide_notes_key').style.display = 'block';
        document.getElementById('notebooks_content').style.display = 'block';
    } else {
        document.getElementById('enter_notes_key').style.display = 'block';
    }
    document.getElementById('saveKeyBtn')?.addEventListener('click', () => {
        const value = document.getElementById('notes_key').value.trim();
        const err = validateNotesKey(value);
        if (err) { alert(err); return; }
        localStorage.setItem('notes_key', value);
        window.location.href = '/notes';
    });
    document.getElementById('clearKeyBtn')?.addEventListener('click', () => {
        localStorage.setItem('notes_key', '');
        window.location.href = '/notes';
    });

    // --- Notebook manage dialog ---
    const dialog = document.getElementById('notebook-dialog');
    const dialogTitle = document.getElementById('notebook-dialog-title');
    const dialogName = document.getElementById('notebook-dialog-name');
    let activeNotebookId = null;
    let activeCard = null;

    // Replace dropdown contents with a single button that opens the dialog
    document.querySelectorAll('.notebook-card').forEach(card => {
        const actions = card.querySelector('.card-header-actions');
        if (!actions) return;
        actions.innerHTML = '';
        const manageBtn = document.createElement('button');
        manageBtn.type = 'button';
        manageBtn.className = 'btn btn-glossy btn-sm';
        manageBtn.innerHTML = '<i class="bi bi-three-dots-vertical"></i>';
        manageBtn.addEventListener('click', () => openDialog(card));
        actions.appendChild(manageBtn);
    });

    function openDialog(card) {
        activeCard = card;
        activeNotebookId = card.dataset.notebookId;
        const title = card.querySelector('.tile-title').textContent;
        dialogTitle.textContent = title;
        dialogName.value = title;
        dialog.showModal();
    }

    document.getElementById('notebook-dialog-close').addEventListener('click', () => dialog.close());
    dialog.addEventListener('click', (e) => { if (e.target === dialog) dialog.close(); });

    const renameBtn = document.getElementById('notebook-dialog-rename-btn');
    const deleteBtn = document.getElementById('notebook-dialog-delete-btn');

    renameBtn.addEventListener('click', async () => {
        if (renameBtn.disabled) return;
        const name = dialogName.value.trim();
        if (!name) return;
        const form = new URLSearchParams();
        form.append('notebook_id', activeNotebookId);
        form.append('name', name);
        renameBtn.disabled = true;
        try {
            const res = await fetch('/notebook/rename', {
                method: 'POST',
                body: form.toString(),
                headers: { 'Content-Type': 'application/x-www-form-urlencoded; charset=utf-8' }
            });
            if (res.url?.includes('error=')) {
                alert('Could not rename notebook. Please try again.');
                return;
            }
            activeCard.querySelector('.tile-title').textContent = name;
            dialog.close();
        } catch (err) {
            console.error('notebook rename failed', err);
            alert('Could not rename notebook. Please try again.');
        } finally {
            renameBtn.disabled = false;
        }
    });

    deleteBtn.addEventListener('click', async () => {
        if (deleteBtn.disabled) return;
        if (!confirm('Delete this notebook and all its notes?')) return;
        const form = new URLSearchParams();
        form.append('notebook_id', activeNotebookId);
        deleteBtn.disabled = true;
        try {
            const res = await fetch('/notebook/delete', {
                method: 'POST',
                body: form.toString(),
                headers: { 'Content-Type': 'application/x-www-form-urlencoded; charset=utf-8' }
            });
            if (res.url?.includes('error=')) {
                alert('Could not delete notebook. Please try again.');
                return;
            }
            activeCard.remove();
            dialog.close();
        } catch (err) {
            console.error('notebook delete failed', err);
            alert('Could not delete notebook. Please try again.');
        } finally {
            deleteBtn.disabled = false;
        }
    });
</script>
