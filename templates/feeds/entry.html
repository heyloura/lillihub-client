<div class="container mt-2">
    <h5>{{title}}</h5>
    <p class="tile-subtitle">{{feedName}} &middot; {{date}}</p>

    <div class="mt-2" style="display:flex;gap:0.5rem;flex-wrap:wrap;">
        {{starButton}}
        {{readButton}}
        {{originalLink}}
    </div>

    <div class="mt-2 pt-2 feed-entry-content" style="border-top:1px solid var(--border);">
        {{content}}
    </div>

    <div class="mt-2 pt-2" style="border-top:1px solid var(--border);display:flex;gap:0.5rem;flex-wrap:wrap;">
        {{starButton}}
        {{readButton}}
        {{originalLink}}
    </div>
</div>
