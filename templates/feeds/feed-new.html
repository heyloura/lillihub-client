<div class="container mt-2">
    <h5>Add Feed</h5>
    <form method="POST" action="/feed/subscribe">
        <div class="mt-2">
            <label class="form-label">Feed or site URL</label>
            <input type="url" name="feed_url" class="form-input" placeholder="https://example.com/feed.xml" required autofocus>
        </div>
        <button type="submit" class="btn btn-glossy mt-2"><i class="bi bi-rss"></i> Subscribe</button>
    </form>
</div>
